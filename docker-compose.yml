

services:
  db:
    image: postgres:16-alpine
    container_name: rakku-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rakku
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: rakku-chatbot-v2-ai-service:latest
    container_name: rakku-ai-service
    restart: always
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rakku-chatbot-v2-backend:latest
    container_name: rakku-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AI_SERVICE_URL=http://ai-service:8000
      - PORT=3001
    depends_on:
      - db
      - ai-service
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rakku-chatbot-v2-frontend:latest
    container_name: rakku-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001/api
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

volumes:
  pgdata:
